<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VisionAI - Ultra Generator</title>
    <!-- Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2fe;
            --secondary: #4facfe;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header */
        header { text-align: center; margin-bottom: 10px; }
        header h1 { 
            font-weight: 800; 
            font-size: 2rem; 
            margin: 0; 
            background: linear-gradient(to right, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p { color: #94a3b8; font-size: 0.9rem; margin-top: 5px; }

        /* Preview Area */
        .art-canvas {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--glass);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        #result-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            transition: opacity 0.5s ease;
        }

        .placeholder-ui { text-align: center; color: #64748b; padding: 20px; }
        .placeholder-ui span { font-size: 3rem; display: block; margin-bottom: 10px; opacity: 0.5; }

        /* Loader */
        .loader {
            display: none;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Inputs */
        .controls {
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass);
        }

        textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid #334155;
            border-radius: 16px;
            color: white;
            padding: 15px;
            font-size: 1rem;
            resize: none;
            margin-bottom: 15px;
            outline: none;
        }
        textarea:focus { border-color: var(--accent); }

        /* Style Chips */
        .style-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin-bottom: 20px;
            padding-bottom: 5px;
        }
        .style-row::-webkit-scrollbar { display: none; }

        .chip {
            background: #334155;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .chip.active {
            background: rgba(0, 242, 254, 0.2);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Buttons */
        .btn-group { display: flex; gap: 10px; }

        .main-btn {
            flex: 2;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            color: #0f172a;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .save-btn {
            flex: 1;
            background: #334155;
            border: none;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .main-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>VisionAI</h1>
        <p>Turn words into high-res art</p>
    </header>

    <div class="art-canvas" id="canvas">
        <div class="loader" id="loader"></div>
        <div class="placeholder-ui" id="placeholder">
            <span>🎨</span>
            Your creation will appear here
        </div>
        <img id="result-img" alt="AI Generated Art">
    </div>

    <div class="controls">
        <textarea id="prompt" rows="3" placeholder="A neon city in the rain, 8k, cinematic..."></textarea>
        
        <div class="style-row" id="style-row">
            <div class="chip active" onclick="selectStyle(this, '')">None</div>
            <div class="chip" onclick="selectStyle(this, 'cyberpunk style, neon lights')">Cyberpunk</div>
            <div class="chip" onclick="selectStyle(this, 'anime style, studio ghibli')">Anime</div>
            <div class="chip" onclick="selectStyle(this, 'hyper-realistic, 8k, photography')">Realistic</div>
            <div class="chip" onclick="selectStyle(this, 'digital art, oil painting')">Painting</div>
        </div>

        <div class="btn-group">
            <button class="main-btn" id="gen-btn" onclick="generate()">Generate</button>
            <button class="save-btn" onclick="downloadImage()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </button>
        </div>
    </div>
</div>

<script>
    let selectedStyle = "";

    function selectStyle(el, styleText) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        selectedStyle = styleText;
    }

    async function generate() {
        const promptInput = document.getElementById('prompt');
        const genBtn = document.getElementById('gen-btn');
        const img = document.getElementById('result-img');
        const loader = document.getElementById('loader');
        const placeholder = document.getElementById('placeholder');

        if (!promptInput.value) return alert("Enter a prompt!");

        // Set UI State
        genBtn.disabled = true;
        genBtn.innerText = "Dreaming...";
        loader.style.display = "block";
        placeholder.style.display = "none";
        img.style.display = "none";

        const fullPrompt = `${promptInput.value}, ${selectedStyle}`;
        const randomSeed = Math.floor(Math.random() * 1000000);
        const url = `https://pollinations.ai{encodeURIComponent(fullPrompt)}?width=1024&height=1024&seed=${randomSeed}&nologo=true`;

        // Load image
        const tempImg = new Image();
        tempImg.src = url;
        tempImg.onload = () => {
            img.src = url;
            img.style.display = "block";
            loader.style.display = "none";
            genBtn.disabled = false;
            genBtn.innerText = "Generate";
        };
    }

    function downloadImage() {
        const img = document.getElementById('result-img');
        if (!img.src) return alert("Generate an image first!");
        
        const link = document.createElement('a');
        link.href = img.src;
        link.download = `VisionAI_${Date.now()}.jpg`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
