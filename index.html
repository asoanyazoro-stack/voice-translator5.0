<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-Down Pro</title>
    
    <style>
        body { margin: 0; background: #0f172a; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #1e293b; padding: 20px; text-align: center; border-bottom: 2px solid #8b5cf6; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }
        h2 { margin: 0; color: #8b5cf6; font-size: 1.4rem; letter-spacing: 1px; }
        .input-box { padding: 15px; background: #1e293b; display: flex; gap: 10px; z-index: 10; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #0f172a; color: white; outline: none; }
        button { background: #ec4899; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #browser { flex: 1; border: none; width: 100%; background: white; }
        .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>V-DOWN PRO</h2>
    </div>

    <div class="input-box">
        <input type="text" id="url" placeholder="Paste TikTok/IG/FB Link...">
        <button onclick="loadDownloader()">FETCH</button>
    </div>

    <div id="welcomeScreen" class="welcome">
        <div style="font-size: 3rem; margin-bottom: 10px;">📥</div>
        <p>Paste a link above and tap <b>FETCH</b><br>to start your high-speed download.</p>
    </div>

    <iframe id="browser" style="display:none;"></iframe>

    <script>
        function loadDownloader() {
            const link = document.getElementById('url').value.trim();
            const browser = document.getElementById('browser');
            const welcome = document.getElementById('welcomeScreen');

            if(!link) { alert("Please paste a link!"); return; }

            // THE SHORTCUT: Use SnapTik (for TikTok) or SaveFrom inside the iframe
            // This ensures the download ALWAYS works.
            let targetSite = "";
            if(link.includes("tiktok.com")) {
                targetSite = "https://snaptik.app/en?url=" + encodeURIComponent(link);
            } else {
                targetSite = "https://en.savefrom.net/1-youtube-video-downloader-524/?url=" + encodeURIComponent(link);
            }

            welcome.style.display = "none";
            browser.style.display = "block";
            browser.src = targetSite;
        }
    </script>
</body>
</html>
