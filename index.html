<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Downloader</title>
    <style>
        body { margin: 0; background: #0f172a; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        .box { background: #1e293b; padding: 40px; border-radius: 20px; text-align: center; width: 85%; max-width: 350px; border: 1px solid #334155; }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: none; font-size: 16px; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #ec4899; color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        #res { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="margin:0; color:#8b5cf6;">V-DOWN</h2>
        <input type="text" id="link" placeholder="Paste Video Link...">
        <button onclick="go()">DOWNLOAD</button>
        <div id="res">Ready</div>
    </div>

    <script>
        async function go() {
            const url = document.getElementById('link').value;
            const res = document.getElementById('res');
            if(!url) return;
            res.innerText = "⏳ Fetching...";
            try {
                const response = await fetch(`https://api.vkrdown.com/server?v=${encodeURIComponent(url)}`);
                const data = await response.json();
                if(data.data && data.data.url) {
                    res.innerHTML = `<a href="${data.data.url[0].url}" target="_blank" style="color:#10b981; text-decoration:none;">✅ DOWNLOAD NOW</a>`;
                } else { res.innerText = "❌ Link not found"; }
            } catch(e) { res.innerText = "❌ Error"; }
        }
    </script>
</body>
</html>
