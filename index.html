<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Down Pro</title>
    <style>
        body { margin: 0; background: #0f172a; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        .box { background: #1e293b; padding: 40px; border-radius: 30px; text-align: center; width: 90%; max-width: 380px; border: 1px solid #334155; }
        h2 { margin: 0; color: #8b5cf6; font-size: 1.8rem; }
        p { color: #94a3b8; font-size: 0.8rem; margin: 10px 0 20px; }
        input { width: 100%; padding: 18px; margin-bottom: 20px; border-radius: 15px; border: none; background: #0f172a; color: white; outline: none; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #ec4899; color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="box">
        <h2>V-DOWN PRO</h2>
        <p>TikTok • Instagram • Facebook</p>
        
        <input type="text" id="vUrl" placeholder="Paste link here...">
        <button onclick="start()">DOWNLOAD</button>
    </div>

    <script>
        function start() {
            const url = document.getElementById('vUrl').value.trim();
            if(!url) return alert("Please paste a link!");

            // This bypasses ALL server errors by using a direct web-intent
            let finalUrl = "";
            
            if(url.includes("tiktok.com")) {
                finalUrl = "https://snaptik.app/en?url=" + encodeURIComponent(url);
            } else if(url.includes("instagram.com")) {
                finalUrl = "https://saveig.app/en?url=" + encodeURIComponent(url);
            } else {
                finalUrl = "https://en.savefrom.net/1-youtube-video-downloader-524/?url=" + encodeURIComponent(url);
            }

            // Directly opens the working downloader site
            window.location.href = finalUrl;
        }
    </script>
</body>
</html>
