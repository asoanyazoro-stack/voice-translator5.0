<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0e; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #16161a; padding: 30px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); width: 100%; max-width: 400px; border: 1px solid #2a2a2a; }
        h1 { font-size: 1.4rem; color: #00f2ff; text-align: center; margin-bottom: 25px; letter-spacing: 1px; }
        label { font-size: 0.9rem; color: #aaa; }
        input { width: 100%; padding: 12px; margin: 10px 0 20px 0; border-radius: 8px; border: 1px solid #333; background: #0b0b0e; color: #fff; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00f2ff; }
        button { width: 100%; padding: 14px; background: #00f2ff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        button:hover { background: #00c8d4; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        #console { margin-top: 25px; background: #000; border-radius: 8px; padding: 12px; font-family: 'Courier New', monospace; font-size: 0.8rem; border: 1px solid #333; height: 120px; overflow-y: auto; color: #00ff95; }
        .err { color: #ff4d4d; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI VIDEO ENGINE</h1>
    <label>Video Text Content:</label>
    <input type="text" id="userInput" placeholder="e.g. Welcome to my new app!">
    
    <button onclick="generateVideo()">RUN GENERATOR</button>

    <div id="console">System: Ready...</div>
</div>

<script>
    async function generateVideo() {
        const consoleBox = document.getElementById('console');
        const text = document.getElementById('userInput').value;
        
        // Your integrated API Key
        const API_KEY = "tdhT5d2GK66b8TwqVWcNDdyjPJbwZ8pdflyBDpoa"; 

        if (!text) {
            consoleBox.innerHTML += `<br><span class="err">[!] Error: No text entered.</span>`;
            return;
        }

        consoleBox.innerHTML += `<br>[>] Requesting video for: "${text}"`;

        const movieData = {
            "comment": "App Generation",
            "settings": { "resolution": "720p" },
            "elements": [
                {
                    "type": "text",
                    "text": text,
                    "duration": 5,
                    "style": "bold",
                    "color": "#ffffff",
                    "font_size": 50
                }
            ]
        };

        try {
            const response = await fetch('https://api.json2video.com/v2/movies', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': API_KEY
                },
                body: JSON.stringify(movieData)
            });

            const data = await response.json();

            if (response.ok) {
                consoleBox.innerHTML += `<br>[+] SUCCESS! ID: ${data.project}`;
                consoleBox.innerHTML += `<br>[+] Rendering has started...`;
            } else {
                consoleBox.innerHTML += `<br><span class="err">[!] API ERROR: ${data.message || 'Unknown error'}</span>`;
            }
        } catch (err) {
            consoleBox.innerHTML += `<br><span class="err">[!] CONNECTION ERROR: Check your internet.</span>`;
        }
        
        // Auto-scroll the console
        consoleBox.scrollTop = consoleBox.scrollHeight;
    }
</script>

</body>
</html>
