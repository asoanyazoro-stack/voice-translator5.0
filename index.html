<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>AI Video Engine v1.0</title> <style> :root { --space-black: #050505; --plasma-purple: #9d50bb; --star-white: #ffffff; } body { background-color: var(--space-black); color: var(--star-white); font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; } .engine-card { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #333; width: 90%; max-width: 500px; text-align: center; } textarea { width: 100%; height: 100px; background: #000; border: 1px solid var(--plasma-purple); color: white; padding: 10px; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; } .generate-btn { background: linear-gradient(45deg, #6e48aa, #9d50bb); color: white; border: none; padding: 15px 30px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; } #status { margin-top: 20px; color: #888; font-size: 0.9rem; } #videoPlayer { margin-top: 20px; width: 100%; display: none; border-radius: 10px; } </style> </head> <body> <div class="engine-card"> <h1>AI VIDEO ENGINE</h1> <p>Convert your vision into motion</p> <textarea id="prompt" placeholder="Describe your video... (e.g., A sunset over a digital city)"></textarea> <button class="generate-btn" onclick="startGeneration()">INITIATE GENERATION</button> <div id="status">Ready for input...</div> <video id="videoPlayer" controls></video> </div> <script> // ========================================== // SPACE 1: PUT YOUR JSON2VIDEO API KEY HERE // ========================================== const MY_API_KEY = "tdhT5d2GK66b8TwqVWcNDdyjPJbwZ8pdflyBDpoa"; async function startGeneration() { const promptValue = document.getElementById('prompt').value; if(!promptValue) return alert("Space command missing: Please enter a prompt."); updateStatus("🚀 Launching request to JSON2Video..."); // ========================================== // SPACE 2: VIDEO CONFIGURATION (JSON DATA) // ========================================== const videoSettings = { "width": 720, "height": 1280, "fps": 30, "scenes": [ { "elements": [ { "type": "text", "text": promptValue, "duration": 5, "style": "bold", "color": "#ffffff" } ] } ] }; try { const response = await fetch('https://api.json2video.com/v2/movie', { method: 'POST', headers: { 'x-api-key': MY_API_KEY, 'Content-Type': 'application/json' }, body: JSON.stringify(videoSettings) }); const data = await response.json(); if(data.project_id) { updateStatus("🛰️ Video is rendering in orbit... checking status."); pollStatus(data.project_id); } else { updateStatus("❌ Error: Check your API Key or Credits."); } } catch (error) { updateStatus("❌ Connection lost in space."); console.error(error); } } async function pollStatus(projectId) { const res = await fetch(`https://api.json2video.com/v2/movie?project_id=${projectId}`, { headers: { 'x-api-key': MY_API_KEY } }); const data = await res.json(); if (data.status === 'completed') { updateStatus("✅ Mission Complete! Video Received."); const player = document.getElementById('videoPlayer'); player.src = data.url; player.style.display = "block"; } else if (data.status === 'failed') { updateStatus("💥 Generation failed. Check API limits."); } else { updateStatus(`⏳ Status: ${data.status.toUpperCase()}...`); // Check again in 5 seconds setTimeout(() => pollStatus(projectId), 5000); } } function updateStatus(msg) { document.getElementById('status').innerText = msg; } </script> </body> </html>
