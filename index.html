<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Down Pro</title>
    <style>
        body { margin: 0; background: #0f172a; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        .box { background: #1e293b; padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #8b5cf6; margin: 0 0 10px 0; font-size: 1.8rem; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: none; background: #334155; color: white; outline: none; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #ec4899; color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        #res { margin-top: 25px; font-weight: bold; min-height: 50px; }
        .dl-btn { display: inline-block; background: #10b981; color: white; padding: 15px 25px; border-radius: 12px; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>V-DOWN PRO</h2>
        <p style="color: #94a3b8; font-size: 0.9rem;">The Ultimate Downloader</p>
        
        <input type="text" id="url" placeholder="Paste IG, TikTok, or YT Link...">
        <button onclick="fetchWithCobalt()">DOWNLOAD</button>
        
        <div id="res">Ready</div>
    </div>

    <script>
        async function fetchWithCobalt() {
            const urlInput = document.getElementById('url').value.trim();
            const resDiv = document.getElementById('res');

            if (!urlInput) {
                resDiv.innerText = "⚠️ Please paste a link!";
                return;
            }

            resDiv.innerHTML = "⏳ Processing with Cobalt API...";

            try {
                // The Secret Shortcut: Cobalt API requires a POST request
                const response = await fetch("https://co.wuk.sh/api/json", {
                    method: "POST",
                    headers: {
                        "Accept": "application/json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        url: urlInput,
                        isAudioOnly: false
                    })
                });

                const data = await response.json();

                if (data && data.status === "redirect" || data.status === "stream" || data.status === "picker") {
                    // Cobalt usually returns a direct URL inside data.url
                    const finalVideoUrl = data.url;
                    
                    resDiv.innerHTML = `
                        <span style="color:#10b981;">✅ Video Found!</span><br>
                        <a href="${finalVideoUrl}" target="_blank" class="dl-btn">📥 SAVE VIDEO</a>
                    `;
                } else {
                    resDiv.innerHTML = "<span style='color: #ef4444;'>❌ Link not supported or private.</span>";
                }
            } catch (error) {
                console.error(error);
                resDiv.innerHTML = "<span style='color: #ef4444;'>❌ Connection failed.</span>";
            }
        }
    </script>
</body>
</html>
